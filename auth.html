<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - VoteNext.com</title>
    <meta name="description" content="Login or register to participate in the VoteNext.com Kerala election social experiment.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow saffron-glow"></div>
        <div class="glow green-glow"></div>
    </div>

    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 0.75rem;">
                    <svg width="32" height="32" viewBox="0 0 100 100" class="ashoka-chakra">
                        <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="4" fill="none"/>
                        <circle cx="50" cy="50" r="8" fill="currentColor"/>
                        <g fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="50" y1="50" x2="50" y2="5"/>
                            <line x1="50" y1="50" x2="50" y2="95"/>
                            <line x1="50" y1="50" x2="5" y2="50"/>
                            <line x1="50" y1="50" x2="95" y2="50"/>
                            <line x1="50" y1="50" x2="18" y2="18"/>
                            <line x1="50" y1="50" x2="82" y2="82"/>
                            <line x1="50" y1="50" x2="18" y2="82"/>
                            <line x1="50" y1="50" x2="82" y2="18"/>
                        </g>
                    </svg>
                    <h1>VoteNext.com</h1>
                </a>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="percentage.html">Live Results</a>
            </div>
        </div>
    </nav>

    <section class="auth-section container">
        <div class="glass-card auth-card">
            <h3 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Secure Entry</h3>
            
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login">Login</div>
                <div class="auth-tab" id="tab-register">Register</div>
            </div>

            <div id="auth-msg" class="auth-message"></div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Sign In To Vote</button>
            </form>

            <form id="registerForm" class="auth-form hidden">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="Minimum 6 characters" required minlength="6">
                </div>
                <button type="submit" class="btn-submit">Create Account</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="container footer-content">
            <div class="footer-logo">VoteNext.com</div>
            <div class="privacy-term">
                <p>Privacy Term: This is a social-experiment not for any purposal bad infulence.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
